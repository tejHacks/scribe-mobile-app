name: Expo Android Build (Free Cloud)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-in to Node 24, kills deprecation spam
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Keep 20 for now; change to 22 if needed later

      - name: Install dependencies
        run: npm ci # or yarn if you use it

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS whoami (debug auth)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami || echo "Auth check failed - check token"

      - name: Validate EAS config (debug)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas config --platform android --profile preview

      - name: Build Expo Android Preview (APK)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --no-wait --clear-cache --json

      # Artifacts step optional - EAS doesn't output file here, but logs build ID
      - name: Upload logs if any
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-logs
          path: ./*.json
          retention-days: 1
